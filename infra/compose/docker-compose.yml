services:
  authentication-microservice:
    build:
      context: ../../authentication-microservice
      dockerfile: 
    container_name: authentication-microservice
    restart: unless-stopped
    env_file:
      - ../../authentication-microservice/.env
    ports:
      - "8080:8080"
    networks:
      - good-health-network
    depends_on:
      - postgres-db:
        condition: service_healthy

  doctorSchedule-microservice:

  emergency-microservice:

  gateway-microservice:

  medicalRecord-microservice:

  notification-microservice:

  pharmacy-microservice:

  register-microservice:

  IAIntegration-microservice:

  frontend-client:

  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - good-health-network

  Mongo-db:

  kafka-broker:

  trafik-router:

volumes:
  postgres_data

networks:
  good-health-network:
    driver: bridge